<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CYBER ATTACK 69 ZONE - BOSS ENAFUL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&display=swap');
        body { background-color: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; padding: 20px; text-align: center; }
        #matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .arabic-header { font-family: 'Amiri', serif; font-size: 3rem; color: #0ff; text-shadow: 0 0 20px #0ff; }
        .hacker-text { font-family: 'Courier New', monospace; font-weight: bold; font-size: 1.5rem; color: #0f0; }
        button { background: #1a1a1a; color: #0f0; border: 1px solid #0f0; padding: 15px 30px; cursor: pointer; border-radius: 5px; font-weight: bold; box-shadow: 0 0 10px #0f0; transition: 0.3s; }
        button:hover { background: #0f0; color: #000; box-shadow: 0 0 20px #0f0; }
        #main-system { border: 2px solid #00f; padding: 20px; background: rgba(0, 0, 20, 0.6); backdrop-filter: blur(5px); border-radius: 15px; margin-top: 20px; }
        .report-item { background: #111; padding: 10px; margin: 5px; border-left: 3px solid #0f0; text-align: left; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>

    <div id="main-system">
        <header>
            <h1 class="arabic-header">سيبير 69</h1>
            <h2 class="hacker-text" id="typewriter"></h2>
        </header>
        <div id="controls"><button onclick="loadReports()">Generate All 100 Reports</button></div>
        <div id="report-container"></div>
    </div>

    <audio id="bg-music" loop><source src="cyber_attack_69_zone.mp3" type="audio/mpeg"></audio>

    <script>
        // পেজ লোড হওয়ার সাথে সাথেই সিস্টেম একটিভ হবে
        window.onload = () => {
            const music = document.getElementById('bg-music');
            music.play().catch(e => console.log("অটো-প্লে ব্লকড"));
            typeEffect("SYSTEM STATUS: ACTIVE [BOSS ENAFUL]");
        };

        // টাইপিং ইফেক্ট
        function typeEffect(text) {
            let i = 0;
            const el = document.getElementById('typewriter');
            function type() { if(i < text.length) { el.innerHTML += text.charAt(i); i++; setTimeout(type, 50); } }
            type();
        }

        // ১০০টি রিপোর্ট জেনারেটর
        function loadReports() {
            const container = document.getElementById('report-container');
            container.innerHTML = '';
            for(let i=1; i<=100; i++) {
                container.innerHTML += `<div class="report-item">Report #${i}: Cyber Security Breach Detected - Priority ${Math.floor(Math.random()*10)}</div>`;
            }
        }

        // অ্যারাবিক ম্যাট্রিক্স ইফেক্ট
        const canvas = document.getElementById('matrix'); const ctx = canvas.getContext('2d');
        canvas.height = window.innerHeight; canvas.width = window.innerWidth;
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789العربيةالقرآنالبرمجةسيبير";
        const fontSize = 16; const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        setInterval(() => {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = fontSize + "px monospace";
            drops.forEach((d, i) => {
                ctx.fillText(letters[Math.floor(Math.random()*letters.length)], i*fontSize, d*fontSize);
                if (d*fontSize > canvas.height) drops[i] = 0;
                drops[i]++;
            });
        }, 33);
    </script>
</body>
</html>
